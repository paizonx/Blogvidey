<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videy Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:Arial,sans-serif;
    color:white;
}

.header{
    text-align:center;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#1d1d1d;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.thumb{
    width:100%;
    height:350px;
    object-fit:cover;
    background:#222;
}

.content{
    padding:15px;
}

.title{
    font-size:16px;
    margin-bottom:15px;
    line-height:1.4;
}

</html>
