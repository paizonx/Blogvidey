<script>

function loadVideos(data){

    const posts = data.feed.entry;
    let html = "";

    posts.forEach(post => {

        // JUDUL
        const title = post.title.$t;

        // ISI POST
        const content = post.content.$t;

        // LINK POSTINGAN
        let postUrl = "#";

        post.link.forEach(link => {
            if(link.rel === "alternate"){
                postUrl = link.href;
            }
        });

        // GAMBAR
        const imgMatch = content.match(/<img[^>]+src="([^">]+)"/i);

        const image = imgMatch
            ? imgMatch[1]
            : "https://via.placeholder.com/500x700?text=No+Image";

        // VIDEY ID
        const videyMatch = content.match(/videy\.(?:co|me)\/(?:v\/\?id=)?([a-zA-Z0-9]+)/i);

        const videyId = videyMatch
            ? videyMatch[1]
            : "";

        html += `
        <div class="card">

            <img class="thumb" src="${image}" alt="${title}">

            <div class="content">

                <div class="title">
                    ${title}
                </div>

                <a class="btn" href="${postUrl}" target="_blank">
                    WATCH NOW
                </a>

            </div>

        </div>
        `;

        console.log({
            title,
            image,
            videyId,
            postUrl
        });

    });

    document.getElementById("loading").style.display = "none";

    document.getElementById("videos").innerHTML = html;

}

</script>

<script src="https://cdnvidey123.blogspot.com/feeds/posts/default?alt=json-in-script&callback=loadVideos"></script>
